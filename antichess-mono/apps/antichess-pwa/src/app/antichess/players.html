<app-header [text]="'Players'" />


<div class="anticontainer antichess main-content">

      <a tabindex="0" (click)="clickTab('rank')">
        <i class="fa-solid fa-medal"></i>
        <span>Rank</span>
      </a>

      <a tabindex="0" (click)="clickTab('titles')">
        <i class="fa-solid fa-award"></i>
        <span>Titles</span>
      </a>

      <a class="active" tabindex="0" (click)="clickTab('players')">

      </a>
    </div>
